version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: bigboss-mysql
    restart: always
    environment:
      MYSQL_DATABASE: bigboss
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
  backend:
    build: .
    container_name: bigboss-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
volumes:
  mysql-data: